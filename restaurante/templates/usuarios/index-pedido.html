{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Pedido — La Paella Real</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/registro-pedido.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <!-- ==========================================
        SIDEBAR
    ========================================== -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="{% static 'img/logo.png' %}" alt="La Paella Real">
        </div>
        <nav class="sidebar-nav">
            <a href="{% url 'inicio_usuarios' %}" class="sidebar-link">
                <i class='bx bx-home-alt'></i>
                <span>Inicio</span>
            </a>
            <a href="{% url 'carta_usuarios' %}" class="sidebar-link">
                <i class='bx bx-food-menu'></i>
                <span>Menú</span>
            </a>
            <a href="{% url 'mis_pedidos' %}" class="sidebar-link">
                <i class='bx bx-receipt'></i>
                <span>Pedidos</span>
            </a>
            <a href="{% url 'carrito_compra' %}" class="sidebar-link active">
                <i class='bx bx-cart'></i>
                <span>Carrito</span>
                <span class="sidebar-badge">3</span>
            </a>
            <a href="{% url 'favoritos_usuarios' %}" class="sidebar-link">
                <i class='bx bx-heart'></i>
                <span>Favoritos</span>
            </a>
            <a href="{% url 'notificaciones_usuarios' %}" class="sidebar-link">
                <i class='bx bx-bell'></i>
                <span>Notificaciones</span>
                <span class="sidebar-badge" id="sidebar-badge">2</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="#" class="sidebar-link">
                <i class='bx bx-log-out'></i>
                <span>Salir</span>
            </a>
            <div class="sidebar-user"
                    onclick="window.location.href='{% url 'mi_perfil' %}'"
                    title="Ver mi perfil"
                    style="cursor:pointer;">
                <img src="{% static 'img/foto-perfil.jpg' %}" alt="Mi Perfil">
            </div>
        </div>
    </aside>

    <!-- ==========================================
        LAYOUT PRINCIPAL
    ========================================== -->
    <div class="page-layout">
        <div class="contenido-principal">

            <!-- ── Encabezado de página ── -->
            <div class="pedido-encabezado">
                <div class="pedido-encabezado-texto">
                    <h1><i class='bx bx-cart-add'></i> Registrar Pedido</h1>
                    <p>Completa los datos para continuar con tu pedido</p>
                </div>
            </div>

            <!-- ── Stepper de pasos ── -->
            <div class="stepper">
                <div class="stepper-paso completado">
                    <div class="stepper-burbuja"><i class='bx bx-check'></i></div>
                    <span class="stepper-label">Carta</span>
                </div>
                <div class="stepper-linea completado"></div>
                <div class="stepper-paso completado">
                    <div class="stepper-burbuja"><i class='bx bx-check'></i></div>
                    <span class="stepper-label">Carrito</span>
                </div>
                <div class="stepper-linea activo"></div>
                <div class="stepper-paso activo">
                    <div class="stepper-burbuja"><i class='bx bx-clipboard'></i></div>
                    <span class="stepper-label">Pedido</span>
                </div>
                <div class="stepper-linea"></div>
                <div class="stepper-paso">
                    <div class="stepper-burbuja"><i class='bx bx-credit-card'></i></div>
                    <span class="stepper-label">Pago</span>
                </div>
            </div>

            <!-- ── Tarjeta del formulario ── -->
            <!-- ── Tarjeta del formulario ── -->
            <form id="formCrearPedido" method="POST" action="{% url 'crear_pedido' %}">
                {% csrf_token %}
            <div class="form-card">

                <!-- Selector tipo de pedido -->
                <div class="tipo-selector">
                    <label class="tipo-opcion" id="opt-domicilio" onclick="seleccionarTipo('domicilio')">
                        <input type="radio" name="tipo_pedido" value="domicilio" id="radio-domicilio">
                        <i class='bx bx-cycling'></i>
                        <h4>Domicilio</h4>
                        <p>Llevamos la paella hasta tu puerta en Bogotá</p>
                    </label>
                    <label class="tipo-opcion" id="opt-evento" onclick="seleccionarTipo('evento')">
                        <input type="radio" name="tipo_pedido" value="evento" id="radio-evento">
                        <i class='bx bx-party'></i>
                        <h4>Evento</h4>
                        <p>Servicio de catering para tu celebración especial</p>
                    </label>
                </div>

                <!-- ==========================================
                    SECCIÓN DOMICILIO
                ========================================== -->
                <div class="form-section" id="seccion-domicilio">

                    <div class="section-title">
                        <i class='bx bx-map-pin'></i> Información de Entrega
                    </div>

                    <div class="campo-completo">
                        <div class="campo-grupo">
                            <label class="campo-label">Dirección de entrega</label>
                            <div class="input-icon">
                                <i class='bx bx-map'></i>
                                <input type="text"
                                       name="direc_domi"
                                       placeholder="Ej: Calle 123 #45-67, Apto 301"
                                       maxlength="100">
                            </div>
                        </div>
                    </div>

                    <div class="fila-campos">
                        <div class="campo-grupo">
                            <label class="campo-label">Barrio</label>
                            <div class="input-icon">
                                <i class='bx bx-map-pin'></i>
                                <select name="id_barrio_domi_fk">
                                    <option value="">Seleccione barrio</option>
                                    {% for barrio in barrios %}
                                    <option value="{{ barrio.id_barrio_pk }}">{{ barrio.nom_barrio }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="campo-grupo">
                            <label class="campo-label">Fecha de entrega</label>
                            <div class="input-icon">
                                <i class='bx bx-calendar'></i>
                                <input type="date" name="fecha_domi" id="fecha-domi">
                            </div>
                        </div>
                    </div>

                    <div class="fila-campos">
                        <div class="campo-grupo">
                            <label class="campo-label">Hora de entrega</label>
                            <div class="input-icon">
                                <i class='bx bx-time'></i>
                                <input type="time"
                                       name="hora_entrega_domi"
                                       id="hora-domi"
                                       min="08:00"
                                       max="20:00">
                            </div>
                        </div>
                        <div class="campo-grupo">
                            <label class="campo-label">Notas especiales (opcional)</label>
                            <div class="input-icon">
                                <i class='bx bx-note'></i>
                                <input type="text"
                                       name="notas_pedido"
                                       placeholder="Ej: Sin picante, alérgico al marisco..."
                                       maxlength="200">
                            </div>
                        </div>
                    </div>

                </div>
                <!-- fin seccion-domicilio -->

                <!-- ==========================================
                    SECCIÓN EVENTO
                ========================================== -->
                <div class="form-section" id="seccion-evento">

                    <div class="section-title">
                        <i class='bx bx-calendar-event'></i> Información del Evento
                    </div>

                    <div class="fila-campos">
                        <div class="campo-grupo">
                            <label class="campo-label">Nombre del evento</label>
                            <div class="input-icon">
                                <i class='bx bx-edit'></i>
                                <input type="text"
                                       name="nom_evento"
                                       placeholder="Ej: Boda de Juan y María"
                                       maxlength="50">
                            </div>
                        </div>
                        <div class="campo-grupo">
                            <label class="campo-label">Tipo de evento</label>
                            <div class="input-icon">
                                <i class='bx bx-category'></i>
                                <select name="id_tipo_evento_fk">
                                    <option value="">Seleccione tipo</option>
                                    {% for tipo in tipos_eventos %}
                                    <option value="{{ tipo.id_tipo_evento_pk }}">{{ tipo.nom_tipo_evento }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="fila-campos">
                        <div class="campo-grupo">
                            <label class="campo-label">Fecha del evento</label>
                            <div class="input-icon">
                                <i class='bx bx-calendar'></i>
                                <input type="date" name="fecha_evento" id="fecha-evento">
                            </div>
                        </div>
                        <div class="campo-grupo">
                            <label class="campo-label">Cantidad de invitados</label>
                            <div class="input-icon">
                                <i class='bx bx-group'></i>
                                <input type="number"
                                       name="cant_invi_evento"
                                       placeholder="Número de personas (máx. 500)"
                                       min="1"
                                       max="500">
                            </div>
                        </div>
                    </div>

                    <div class="fila-campos">
                        <div class="campo-grupo">
                            <label class="campo-label">Hora de inicio</label>
                            <div class="input-icon">
                                <i class='bx bx-time'></i>
                                <input type="time"
                                       name="hora_inicio_evento"
                                       id="hora-inicio-evento"
                                       min="12:00"
                                       max="20:00">
                            </div>
                        </div>
                        <div class="campo-grupo">
                            <label class="campo-label">Hora de fin</label>
                            <div class="input-icon">
                                <i class='bx bx-time-five'></i>
                                <input type="time"
                                       name="hora_fin_evento"
                                       id="hora-fin-evento"
                                       min="13:00"
                                       max="21:00">
                            </div>
                        </div>
                    </div>

                    <div class="fila-campos">
                        <div class="campo-grupo">
                            <label class="campo-label">Ubicación del evento</label>
                            <div class="input-icon">
                                <i class='bx bx-map'></i>
                                <input type="text"
                                       name="ubi_evento"
                                       placeholder="Ej: Dirección completa del lugar"
                                       maxlength="100">
                            </div>
                        </div>
                        <div class="campo-grupo">
                            <label class="campo-label">Mesa / Espacio</label>
                            <div class="input-icon">
                                <i class='bx bx-table'></i>
                                <select name="id_mesa_evento_fk">
                                    <option value="">Seleccione espacio</option>
                                    {% for mesa in mesas %}
                                    <option value="{{ mesa.id_mesa_pk }}">Mesa {{ mesa.num_mesa }} (Cap: {{ mesa.capacidad_mesa }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="campo-completo">
                        <div class="campo-grupo">
                            <label class="campo-label">Notas especiales (opcional)</label>
                            <div class="input-icon input-icon-textarea">
                                <i class='bx bx-note'></i>
                                <textarea name="notas_pedido"
                                          placeholder="Ej: Menú sin gluten, decoración española, alergias..."
                                          rows="3"></textarea>
                            </div>
                        </div>
                    </div>

                </div>
                <!-- fin seccion-evento -->

                <!-- ── Acciones del formulario ── -->
                <div class="form-actions">
                    <a href="{% url 'carrito_compra' %}" class="btn-volver">
                        <i class='bx bx-arrow-back'></i> Volver al carrito
                    </a>
                    <button type="button"
                            class="btn-continuar"
                            id="btn-continuar"
                            disabled
                            onclick="validarYContinuar()">
                        Continuar al pago <i class='bx bx-right-arrow-alt'></i>
                    </button>
                </div>

            </div>
            </form>
            <!-- fin form-card -->

        </div>
        <!-- fin contenido-principal -->
    </div>
    <!-- fin page-layout -->

    <!-- ==========================================
        JAVASCRIPT
    ========================================== -->
    <script src="{% static 'js/alertas.js' %}"></script>
    <script src="{% static 'js/pedido.js' %}"></script>

</body>
</html>

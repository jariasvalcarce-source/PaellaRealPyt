<div class="topbar-right" style="display: flex; align-items: center; gap: 1.5rem;">
    <div id="user-notif-container" hx-get="{% url 'notif_dropdown_hx' %}" hx-trigger="every 15s [document.visibilityState=='visible' && !document.getElementById('notifDropdown').classList.contains('show')]" hx-swap="innerHTML">
        {% include 'usuarios/_notif_user_partial.html' %}
    </div>

    <!-- Perfil / Dropdown -->
    <div class="user-dropdown-wrap" style="position: relative;">
        <div class="topbar-user" onclick="window.location.href='{% url 'mi_perfil' %}'" title="Ver mi perfil" style="cursor: pointer; display: flex; align-items: center; gap: 0.75rem;">
            {% if cliente_global.foto_cliente and cliente_global.foto_cliente != 'default.png' %}
                <img src="/media/{{ cliente_global.foto_cliente }}" alt="Mi Perfil" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--borde-light);" id="headerAvatarImage">
            {% else %}
                <div class="user-avatar" id="headerAvatarLetter" style="width: 40px; height: 40px; border-radius: 50%; background: #6B1A2B; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                    {{ cliente_global.nom_clien|default:"U"|slice:":1"|upper }}
                </div>
            {% endif %}
            <div class="user-info" style="display: flex; flex-direction: column;">
                <span class="user-name" style="font-weight: 700; color: #2C1810; font-size: 0.9rem;">{{ cliente_global.nom_clien|default:"Usuario" }}</span>
                <span class="user-role" style="font-size: 0.75rem; color: #7A5C52;">Cliente</span>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleNotifDropdown(e) {
        e.stopPropagation();
        const dropdown = document.getElementById('notifDropdown');
        if (dropdown) dropdown.classList.toggle('show');
    }
    document.addEventListener('click', function(e) {
        const notifWrap = document.querySelector('.notif-wrap');
        const dropdown = document.getElementById('notifDropdown');
        if (notifWrap && dropdown && !notifWrap.contains(e.target)) {
            dropdown.classList.remove('show');
        }
    });
</script>

<!-- HTMX POLLING: CARGA FANTASMA -->
<!-- Reemplazamos la lógica vieja por HTMX: cada 5s se consultan los badges en BD -->
<div hx-get="{% url 'badge_sincronizacion' %}" hx-trigger="every 5s" hx-swap="none" style="display:none;"></div>
<form id="csrf-form-global" style="display:none;">{% csrf_token %}</form>
<script>
window.PAELLA_CARRITO_KEY = 'miCarritoPaella_usuario_{{ request.session.usuario_id|default:"guest" }}';
window.PAELLA_FAVORITOS_KEY = 'paellaFavoritos_usuario_{{ request.session.usuario_id|default:"guest" }}';

function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function agregarAlCarritoSync(menuId, btnElement) {
    let token = getCookie('csrftoken');
    if (!token) {
        let input = document.querySelector('#csrf-form-global input[name=csrfmiddlewaretoken]');
        if (input) token = input.value;
    }
    
    // Cambiar estado del botón a cargando
    let originalHtml = btnElement.innerHTML;
    btnElement.innerHTML = "<i class='bx bx-loader-alt bx-spin'></i> Añadiendo";
    btnElement.disabled = true;

    fetch(`/sync/carrito/add/${menuId}/`, {
        method: 'POST',
        headers: {
            'X-CSRFToken': token,
            'Content-Type': 'application/json',
            'X-Requested-With': 'XMLHttpRequest'
        },
        body: JSON.stringify({cantidad: 1})
    })
    .then(response => {
        if (!response.ok) throw new Error('Error en servidor');
        return response.text();
    })
    .then(html => {
        // Ejecutar HTMX swap manual o dejar que htmx lo procese si es OOB
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = html;
        
        // Ejecutar scripts dentro del HTML retornado (localStorage)
        const scripts = tempDiv.querySelectorAll('script');
        scripts.forEach(script => {
            const newScript = document.createElement('script');
            newScript.textContent = script.textContent;
            document.body.appendChild(newScript);
            setTimeout(() => newScript.remove(), 100);
        });

        // Actualizar los badges manualmente desde la respuesta
        const badgeCarritoHtml = tempDiv.querySelector('#badge-carrito-sidebar');
        const badgeFavHtml = tempDiv.querySelector('#badge-favoritos-sidebar');
        
        if (badgeCarritoHtml) {
            document.querySelectorAll('#badge-carrito-sidebar').forEach(el => el.outerHTML = badgeCarritoHtml.outerHTML);
        }
        if (badgeFavHtml) {
            document.querySelectorAll('#badge-favoritos-sidebar').forEach(el => el.outerHTML = badgeFavHtml.outerHTML);
        }

        // Mostrar SweetAlert
        Swal.fire({
            toast: true, position: 'bottom-end', icon: 'success', title: 'Agregado al carrito', showConfirmButton: false, timer: 2000
        });
    })
    .catch(error => {
        Swal.fire({
            toast: true, position: 'bottom-end', icon: 'error', title: 'Error al agregar', showConfirmButton: false, timer: 2000
        });
    })
    .finally(() => {
        // Restaurar botón
        btnElement.innerHTML = originalHtml;
        btnElement.disabled = false;
    });
}

document.body.addEventListener('htmx:configRequest', (event) => {
    let token = getCookie('csrftoken');
    if (!token) {
        let input = document.querySelector('#csrf-form-global input[name=csrfmiddlewaretoken]');
        if (input) token = input.value;
    }
    if (token) {
        event.detail.headers['X-CSRFToken'] = token;
    }
});
</script>

<div class="topbar-right" style="display: flex; align-items: center; gap: 1.5rem;">
    <div id="user-notif-container" hx-get="{% url 'notif_dropdown_hx' %}" hx-trigger="every 15s [document.visibilityState=='visible' && !document.getElementById('notifDropdown').classList.contains('show')]" hx-swap="innerHTML">
        {% include 'usuarios/_notif_user_partial.html' %}
    </div>

    <!-- Perfil / Dropdown -->
    <div class="user-dropdown-wrap" style="position: relative;">
        <div class="topbar-user" onclick="window.location.href='{% url 'mi_perfil' %}'" title="Ver mi perfil" style="cursor: pointer; display: flex; align-items: center; gap: 0.75rem;">
            {% if cliente_global.foto_cliente and cliente_global.foto_cliente != 'default.png' %}
                <img src="/media/{{ cliente_global.foto_cliente }}" alt="Mi Perfil" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1.5px solid var(--borde-light);" id="headerAvatarImage">
            {% else %}
                <div class="user-avatar" id="headerAvatarLetter" style="width: 40px; height: 40px; border-radius: 50%; background: #6B1A2B; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold;">
                    {{ cliente_global.nom_clien|default:"U"|slice:":1"|upper }}
                </div>
            {% endif %}
            <div class="user-info" style="display: flex; flex-direction: column;">
                <span class="user-name" style="font-weight: 700; color: #2C1810; font-size: 0.9rem;">{{ cliente_global.nom_clien|default:"Usuario" }}</span>
                <span class="user-role" style="font-size: 0.75rem; color: #7A5C52;">Cliente</span>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleNotifDropdown(e) {
        e.stopPropagation();
        const dropdown = document.getElementById('notifDropdown');
        if (dropdown) dropdown.classList.toggle('show');
    }
    document.addEventListener('click', function(e) {
        const notifWrap = document.querySelector('.notif-wrap');
        const dropdown = document.getElementById('notifDropdown');
        if (notifWrap && dropdown && !notifWrap.contains(e.target)) {
            dropdown.classList.remove('show');
        }
    });

    // ==========================================
    // BADGES DINÁMICOS PARA CARRITO Y FAVORITOS
    // ==========================================
    window.PAELLA_CARRITO_KEY = 'miCarritoPaella_usuario_{{ request.session.usuario_id|default:"guest" }}';
    window.PAELLA_FAVORITOS_KEY = 'paellaFavoritos_usuario_{{ request.session.usuario_id|default:"guest" }}';

    function actualizarBadgesGlobales() {
        // Carrito
        let carrito = {};
        try { carrito = JSON.parse(localStorage.getItem(window.PAELLA_CARRITO_KEY)) || {}; } catch(e) {}
        let totalCartItems = 0;
        Object.values(carrito).forEach(item => totalCartItems += (item.cantidad || 1));
        
        // Sidebar carrito
        document.querySelectorAll('.sidebar-link i.bx-cart').forEach(icon => {
            let link = icon.closest('.sidebar-link');
            let badge = link.querySelector('.sidebar-badge');
            if (!badge) {
                badge = document.createElement('span');
                badge.className = 'sidebar-badge';
                badge.id = 'badge-carrito-sidebar';
                link.appendChild(badge);
            }
            if (totalCartItems > 0) {
                badge.textContent = totalCartItems;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
        });

        // Floating cart badge
        document.querySelectorAll('.floating-cart-badge').forEach(badge => {
            if (totalCartItems > 0) {
                badge.textContent = totalCartItems;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
        });

        // Favoritos
        let favoritos = [];
        try { favoritos = JSON.parse(localStorage.getItem(window.PAELLA_FAVORITOS_KEY)) || []; } catch(e) {}
        let totalFavs = Array.isArray(favoritos) ? favoritos.length : Object.keys(favoritos).length;
        
        document.querySelectorAll('.sidebar-link i.bx-heart').forEach(icon => {
            let link = icon.closest('.sidebar-link');
            let badge = link.querySelector('.sidebar-badge');
            if (!badge) {
                badge = document.createElement('span');
                badge.className = 'sidebar-badge';
                badge.id = 'badge-favoritos-sidebar';
                link.appendChild(badge);
            }
            if (totalFavs > 0) {
                badge.textContent = totalFavs;
                badge.style.display = 'flex';
            } else {
                badge.style.display = 'none';
            }
        });
    }

    document.addEventListener('DOMContentLoaded', actualizarBadgesGlobales);
    // Para que actualice si otra pestaña cambia localStorage o desde otras funciones como agregar/quitar
    window.addEventListener('storage', actualizarBadgesGlobales);

    // Sobrescribimos el setItem temporalmente para detectar cambios en la misma ventana
    const originalSetItem = localStorage.setItem;
    localStorage.setItem = function(key, value) {
        originalSetItem.apply(this, arguments);
        if (key === window.PAELLA_CARRITO_KEY || key === window.PAELLA_FAVORITOS_KEY) {
            actualizarBadgesGlobales();
        }
    };
    const originalRemoveItem = localStorage.removeItem;
    localStorage.removeItem = function(key) {
        originalRemoveItem.apply(this, arguments);
        if (key === window.PAELLA_CARRITO_KEY || key === window.PAELLA_FAVORITOS_KEY) {
            actualizarBadgesGlobales();
        }
    };
</script>
<style>
@media (max-width: 1024px) {
    /* Sidebar principal */
    .sidebar { width: 72px !important; border-radius: 0 20px 20px 0 !important; }
    .page-layout { margin-left: 72px !important; }
    
    /* Topbar */
    .topbar { left: 72px !important; width: calc(100% - 72px) !important; padding: 10px 15px !important; }
    
    /* Logo de la sidebar */
    .sidebar-logo { padding: 15px 5px !important; }
    .sidebar-logo img { width: 42px !important; height: auto !important; }
    
    /* Items del menú */
    .sidebar-link span:not(.sidebar-badge) { display: none !important; }
    .sidebar-link { padding: 12px 0 !important; justify-content: center !important; position: relative !important; flex-direction: column !important; }
    .sidebar-link i { font-size: 26px !important; margin: 0 !important; color: rgba(255,255,255,0.7) !important; }
    .sidebar-link.active i, .sidebar-link:hover i { color: #ffffff !important; }
    
    /* Footer del sidebar */
    .sidebar-footer .sidebar-link { margin: 0 !important; justify-content: center !important; }
    .sidebar-user { justify-content: center !important; padding: 10px 5px !important; display: flex !important; margin: 0 !important; }
    .sidebar-user .user-info { display: none !important; }
    .sidebarAvatarImage, .sidebar-avatar-letter { width: 36px !important; height: 36px !important; }
    
    /* Topbar Avatar */
    .topbar-user .user-info { display: none !important; }
    
    /* Layouts en general */
    .categories-grid, .featured-grid, .info-grid { grid-template-columns: 1fr !important; }
    .form-group-row, .order-details-grid { grid-template-columns: 1fr !important; }
    .table-responsive { overflow-x: auto !important; width: 100% !important; }
}
</style>

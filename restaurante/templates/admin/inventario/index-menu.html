{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Menú</title>
    <link rel="stylesheet" href="{% static 'css/style-formularios.css' %}">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

    <!-- ==================================
        Barra Navegación
    ================================== -->
    <aside class="barra-lateral">
        {% include 'admin/includes/sidebar_izquierda.html' %}
        
        <!-- ==================================
            Barra Notificaciones
        ================================== -->
        {% include "admin/includes/sidebar_derecha.html" %}
    </aside>

    <!-- ==================================
        Formulario Registro
    ================================== -->
    <div class="contenido-principal">
        <div class="seccion-superior">
            <div class="encabezado">
                <h1>Registrar Menú</h1>
            </div>

            {% if messages %}
            <script>
                document.addEventListener('DOMContentLoaded', function() {
                    {% for message in messages %}
                        Swal.fire({
                            icon: "{% if message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% else %}error{% endif %}",
                            title: "{% if message.tags == 'success' %}¡Éxito!{% elif message.tags == 'error' %}Error{% else %}Aviso{% endif %}",
                            text: "{{ message }}",
                            confirmButtonText: 'Entendido',
                            confirmButtonColor: "{% if message.tags == 'success' or message.tags == 'warning' %}#7f0404{% else %}#d33{% endif %}"
                        });
                    {% endfor %}
                });
            </script>
            {% endif %}

            <div class="formulario">
                <form action="{% url 'crear_menu' %}" method="POST" id="form-crear-menu"
                        
                class="form" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- ==================================
                        Campos del Menú
                    ================================== -->
                    <div class="grupo-campos">
                        <div class="fila-campos">
                            <label>
                                <span class="label-texto">Nombre del Plato</span>
                                <i class='bx bx-food-menu'></i>
                                <input type="text" name="nom_menu"
                                        placeholder="Paella Valenciana..."
                                        required maxlength="60">
                            </label>
                            <label>
                                <span class="label-texto">Precio ($)</span>
                                <i class='bx bx-money'></i>
                                <input type="number" name="precio_menu"
                                        placeholder="45000"
                                        required min="0.01" step="0.01">
                            </label>
                        </div>

                        <div class="fila-campos">
                            <label>
                                <span class="label-texto">Imagen del plato</span>
                                <i class='bx bx-image'></i>
                                <input type="file" name="img_menu"
                                        accept="image/*" required
                                        onchange="previewImagen(this)">
                                <img id="previewCrear"
                                    style="width:120px;height:90px;object-fit:cover;
                                            border-radius:8px;margin-top:8px;display:none;"
                                        alt="Vista previa">
                            </label>
                            <label>
                                <span class="label-texto">Tipo de Menú</span>
                                <i class='bx bx-category'></i>
                                <select name="id_tipo_menu_fk" required>
                                    <option value="">Seleccione un tipo</option>
                                    {% for tipo in tipos %}
                                        <option value="{{ tipo.id_tipo_menu_pk }}">
                                            {{ tipo.nom_tipo_menu }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </label>
                        </div>

                        <label>
                            <span class="label-texto">Descripción</span>
                            <i class='bx bx-detail'></i>
                            <input type="text" name="des_menu"
                                    placeholder="Describe el plato..."
                                    required maxlength="500">
                        </label>

                    </div>

                    <!-- ==================================
                        Botones
                    ================================== -->
                    <div class="separador-botones">
                        <div class="button">
                            <button type="submit">
                                <i class='bx bx-plus'></i> Agregar Menú
                            </button>
                            <a href="{% url 'tabla_menus' %}" class="btn-card-action">
                                <i class='bx bx-search'></i> Ver Menús
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
        <!-- ===== JavaScripts =====-->
    <script src="{% static 'js/validacion-menu.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const formCrearMenu = document.getElementById('form-crear-menu');
            if (formCrearMenu) {
                formCrearMenu.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    if (!formCrearMenu.checkValidity()) {
                        formCrearMenu.reportValidity();
                        return;
                    }

                    Swal.fire({
                        title: '¿Confirmar Registro?',
                        text: "¿Estás seguro de registrar este menú?",
                        icon: 'question',
                        showCancelButton: true,
                        confirmButtonColor: '#7f0404',
                        cancelButtonColor: '#6c757d',
                        confirmButtonText: 'Sí, registrar',
                        cancelButtonText: 'Cancelar'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            formCrearMenu.submit();
                        }
                    });
                });
            }
        });
    </script>
</body>

</html>

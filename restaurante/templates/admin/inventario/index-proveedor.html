{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Proveedor</title>
    <link rel="stylesheet" href="{% static 'css/style-formularios.css' %}">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>
    <!-- ==================================
        Barra Navegación
    ================================== -->
    <aside class="barra-lateral">
        {% include 'admin/includes/sidebar_izquierda.html' %}

        <!-- ==================================
            Barra Notificaciones
        ================================== -->
        {% include "admin/includes/sidebar_derecha.html" %}
    </aside>

    <!-- ==================================
        Formulario Registro
    ================================== -->
    <div class="contenido-principal">
        <div class="seccion-superior">
            <div class="encabezado">
                <h1>Registrar Proveedor</h1>
            </div>

            {% if messages %}
            <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
            <script>
                document.addEventListener('DOMContentLoaded', function() {
                    {% for message in messages %}
                        Swal.fire({
                            icon: "{% if message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% else %}error{% endif %}",
                            title: "{% if message.tags == 'success' %}¡Éxito!{% elif message.tags == 'error' %}Error{% else %}Aviso{% endif %}",
                            text: "{{ message }}",
                            confirmButtonText: 'Entendido',
                            confirmButtonColor: "{% if message.tags == 'success' or message.tags == 'warning' %}#7f0404{% else %}#d33{% endif %}"
                        });
                    {% endfor %}
                });
            </script>
            {% endif %}

            <div class="formulario">
                <form action="{% url 'crear_proveedor' %}" method="POST" class="form">
                    {% csrf_token %}

                    <!-- ==================================
                        Info Personal
                    ================================== -->
                    <div class="grupo-campos">
                        <div class="fila-campos">
                            <label>
                                <span class="label-texto">Nombres</span>
                                <i class='bx bx-user'></i>
                                <input type="text" name="nom_provee"
                                        placeholder="Ingrese los nombres"
                                        required
                                        pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+"
                                        maxlength="25"
                                        title="Solo letras y espacios (máximo 25 caracteres)">
                            </label>
                            <label>
                                <span class="label-texto">Apellidos</span>
                                <i class='bx bx-id-card'></i>
                                <input type="text" name="apellido_provee"
                                        placeholder="Ingrese los apellidos"
                                        pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+"
                                        maxlength="30"
                                        title="Solo letras y espacios (máximo 30 caracteres)">
                            </label>
                        </div>

                        <label>
                            <span class="label-texto">Fecha de Nacimiento</span>
                            <i class='bx bxs-calendar'></i>
                            <input type="date" id="fecha-nacimiento"
                                    name="fecha_naci_provee"
                                    required
                                    max="{{ fecha_max }}"
                                    title="Seleccione una fecha válida">
                        </label>
                        <p id="mensaje"></p>
                    </div>

                    <!-- Información de Contacto -->
                    <div class="grupo-campos">
                        <label>
                            <span class="label-texto">Número de Teléfono</span>
                            <i class='bx bx-phone'></i>
                            <input type="tel" name="tel_provee"
                                    placeholder="Ej: 3101234567"
                                    required
                                    pattern="(300|301|302|303|304|305|310|311|312|313|314|315|316|317|318|319|320|321|322|323|324|350|351)[0-9]{7}"
                                    title="Número colombiano válido (ej: 3101234567)"
                                    maxlength="10">
                        </label>

                        <label>
                            <span class="label-texto">Correo Electrónico</span>
                            <i class='bx bx-envelope'></i>
                            <input type="email" name="correo_provee"
                                    placeholder="ejemplo@correo.com"
                                    required
                                    maxlength="40"
                                    title="Correo electrónico válido">
                        </label>

                        <label>
                            <span class="label-texto">Dirección Completa</span>
                            <i class='bx bx-map'></i>
                            <input type="text" name="direc_provee"
                                    placeholder="Ingrese la dirección completa"
                                    required
                                    maxlength="100"
                                    title="Máximo 100 caracteres">
                        </label>
                    </div>

                    <!-- ==================================
                        Botones
                    ================================== -->
                    <div class="separador-botones">
                        <div class="button">
                            <button type="submit">
                                <i class='bx bx-plus'></i>
                                Agregar Proveedor
                            </button>
                            <a href="{% url 'tabla_proveedores' %}" class="btn-card-action">
                                <i class='bx bx-search'></i> Ver Proveedores
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- ===== JavaScripts =====-->
    <script src="{% static 'js/validacion-proveedor.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('.form');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    if (!form.checkValidity()) {
                        form.reportValidity();
                        return;
                    }

                    // Validar edad (mayor de 18 años)
                    const fechaNacimientoInput = document.getElementById('fecha-nacimiento');
                    if (fechaNacimientoInput && fechaNacimientoInput.value) {
                        const hoy = new Date();
                        const fechaNac = new Date(fechaNacimientoInput.value);
                        let edad = hoy.getFullYear() - fechaNac.getFullYear();
                        const m = hoy.getMonth() - fechaNac.getMonth();
                        
                        if (m < 0 || (m === 0 && hoy.getDate() < fechaNac.getDate())) {
                            edad--;
                        }
                        
                        if (edad < 18) {
                            Swal.fire({
                                title: 'Error de Edad',
                                text: 'El proveedor debe ser mayor de 18 años.',
                                icon: 'warning',
                                confirmButtonColor: '#7f0404',
                                confirmButtonText: 'Corregir'
                            });
                            return; // Evita el envío del formulario sin borrar los datos
                        }
                    }

                    Swal.fire({
                        title: '¿Confirmar Registro?',
                        text: "¿Estás seguro de que todos los datos del nuevo proveedor están correctos?",
                        icon: 'question',
                        showCancelButton: true,
                        confirmButtonColor: '#7f0404',
                        cancelButtonColor: '#6c757d',
                        confirmButtonText: 'Sí, crear proveedor',
                        cancelButtonText: 'Cancelar'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            form.submit();
                        }
                    });
                });
            }
        });
    </script>
</body>

</html>

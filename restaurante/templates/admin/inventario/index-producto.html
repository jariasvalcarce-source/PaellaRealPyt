{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Producto</title>
    <link rel="stylesheet" href="{% static 'css/style-formularios.css' %}">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>
    <!-- ==================================
        Barra Navegación
    ================================== -->
    <aside class="barra-lateral">
        {% include 'admin/includes/sidebar_izquierda.html' %}

        <!-- ==================================
            Barra Notificaciones
        ================================== -->
        {% include "admin/includes/sidebar_derecha.html" %}
    </aside>

    <!-- ==================================
        Formulario Registro
    ================================== -->
    <div class="contenido-principal">
        <div class="seccion-superior">
            <div class="encabezado">
                <h1>Registrar Producto</h1>
            </div>

            {% if messages %}
            <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
            <script>
                document.addEventListener('DOMContentLoaded', function() {
                    {% for message in messages %}
                        Swal.fire({
                            icon: "{% if message.tags == 'success' %}success{% elif message.tags == 'warning' %}warning{% else %}error{% endif %}",
                            title: "{% if message.tags == 'success' %}¡Éxito!{% elif message.tags == 'error' %}Error{% else %}Aviso{% endif %}",
                            text: "{{ message }}",
                            confirmButtonText: 'Entendido',
                            confirmButtonColor: "{% if message.tags == 'success' or message.tags == 'warning' %}#7f0404{% else %}#d33{% endif %}"
                        });
                    {% endfor %}
                });
            </script>
            {% endif %}

            <div class="formulario">
                <form action="{% url 'crear_producto' %}" method="POST" class="form">
                    {% csrf_token %}

                    <!-- ==================================
                        Campos del Producto
                    ================================== -->
                    <div class="grupo-campos">
                        <div class="fila-campos">
                            <label>
                                <span class="label-texto">Nombre del Producto</span>
                                <i class='bx bx-cube'></i>
                                <input type="text" name="nom_produ"
                                        placeholder="Arroz, pollo, aceite..."
                                        required maxlength="50">
                            </label>
                            <label>
                                <span class="label-texto">Descripción</span>
                                <i class='bx bx-detail'></i>
                                <input type="text" name="des_produ"
                                        placeholder="Descripción breve del producto"
                                        required maxlength="100">
                            </label>
                        </div>

                        <div class="fila-campos" style="margin-top: 10px;">
                            <label>
                                <span class="label-texto">Stock Actual (kg/L/und)</span>
                                <i class='bx bx-sort-up'></i>
                                <input type="number" name="stock_actual_produ"
                                        placeholder="Cantidad en unidad base (ej: kg, L)"
                                        required min="0" step="0.001">
                            </label>
                            <label>
                                <span class="label-texto">Stock Mínimo</span>
                                <i class='bx bx-sort-down'></i>
                                <input type="number" name="stock_minimo_produ"
                                        placeholder="Nivel de alerta"
                                        required min="0" step="0.001">
                            </label>
                        </div>

                        <div class="fila-campos">
                            <label>
                                <span class="label-texto">Precio Unitario ($)</span>
                                <i class='bx bx-money'></i>
                                <input type="number" name="precio_uni_produ"
                                        placeholder="0.00"
                                        required min="0.01" step="0.01">
                            </label>
                            <label>
                                <span class="label-texto">Fecha de Vencimiento</span>
                                <i class='bx bx-calendar'></i>
                                <input type="date" name="fecha_venci_produ"
                                        required min="{{ fecha_min }}">
                            </label>
                        </div>
                    </div>

                    <!-- Relaciones -->
                    <div class="grupo-campos">

                        <label>
                            <span class="label-texto">Proveedor</span>
                            <i class='bx bx-store'></i>
                            <select name="id_provee_produ_fk" required>
                                <option value="">Seleccione un proveedor</option>
                                {% for proveedor in proveedores %}
                                    <option value="{{ proveedor.id_provee_pk }}">
                                        {{ proveedor.nom_provee }} {{ proveedor.apellido_provee }}
                                    </option>
                                {% endfor %}
                            </select>
                        </label>

                        <label>
                            <span class="label-texto">Unidad de Medida</span>
                            <i class='bx bx-ruler'></i>
                            <select name="id_uni_medi_produ_fk" required>
                                <option value="">Seleccione una unidad</option>
                                {% for unidad in unidades %}
                                    <option value="{{ unidad.id_uni_medi_pk }}">
                                        {{ unidad.nom_uni_medi }} ({{ unidad.abreviatura }}) — {{ unidad.tipo_uni_medi }}
                                    </option>
                                {% endfor %}
                            </select>
                        </label>

                        <label>
                            <span class="label-texto">Categoría</span>
                            <i class='bx bx-category'></i>
                            <select name="id_cate_produ_fk" required>
                                <option value="">Seleccione una categoría</option>
                                {% for categoria in categorias %}
                                    <option value="{{ categoria.id_cate_produ_pk }}">
                                        {{ categoria.nom_cate }}
                                    </option>
                                {% endfor %}
                            </select>
                        </label>
                    </div>

                    <!-- ==================================
                        Botones
                    ================================== -->
                    <div class="separador-botones">
                        <div class="button">
                            <button type="submit">
                                <i class='bx bx-plus'></i>
                                Agregar Producto
                            </button>
                            <a href="{% url 'tabla_productos' %}" class="btn-card-action">
                                <i class='bx bx-search'></i> Ver Productos
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <!-- ===== JavaScripts =====-->
    <script src="{% static 'js/validacion-producto.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.querySelector('.form');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    if (!form.checkValidity()) {
                        form.reportValidity();
                        return;
                    }

                    // Confirmación de registro de producto
                    Swal.fire({
                        title: '¿Confirmar Registro?',
                        text: "¿Estás seguro de registrar este nuevo producto en el inventario?",
                        icon: 'question',
                        showCancelButton: true,
                        confirmButtonColor: '#7f0404',
                        cancelButtonColor: '#6c757d',
                        confirmButtonText: 'Sí, crear producto',
                        cancelButtonText: 'Revisar datos'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            form.submit();
                        }
                    });
                });
            }
        });
    </script>
</body>

</html>

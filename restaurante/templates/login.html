{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - La Paella Real</title>
    <link rel="stylesheet" href="{% static 'css/login-registro.css' %}" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Pacifico&display=swap" rel="stylesheet" />
</head>

<body>
    <div class="login-container">
        <div class="image-section">
            <img src="{% static 'img/login.png' %}" alt="La Paella Real" />
        </div>

        <div class="login-box">
            <h1>La Paella Real</h1>
            <h2>Inicie Sesión</h2>

            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="alert{% if message.tags %} {{ message.tags }}{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="input-group">
                    <label for="username_or_email">Usuario o Correo electrónico</label>
                    <input id="username_or_email" type="text" name="email" placeholder="Nombre de usuario o correo" required autofocus value="{{ datos.email|default:'' }}" />
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input id="password" type="password" name="password" required />
                </div>

                <button type="submit" class="btn">Iniciar Sesión</button>
            </form>

            <p class="extra">¿No tienes cuenta?
                <a href="{% url 'registro' %}">Regístrate aquí</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            {% if login_success %}
                Swal.fire({
                    icon: 'success',
                    title: 'Inicio de sesión correcto',
                    text: 'Te estamos redirigiendo al módulo...',
                    timer: 1700,
                    timerProgressBar: true,
                    showConfirmButton: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                }).then(() => {
                    window.location.href = '{{ redirect_url }}';
                });
            {% endif %}
        });
    </script>
</body>

</html>

$kind: collection
name: 'Django Local API - Bulk Upload'
variables:
  - key: baseUrl
    value: 'http://localhost:8000'
items:
  - $kind: folder
    name: Productos
    items:
      - $kind: http-request
        name: 'GET list productos'
        method: GET
        url: '{{baseUrl}}/api/productos/'
        headers:
          - key: Accept
            value: application/json
        scripts:
          - type: afterResponse
            language: text/javascript
            code: |-
              pm.test("Status is 2xx", function () {
                pm.expect(pm.response.code).to.be.within(200, 299);
              });

              try {
                pm.response.json();
              } catch (e) {
                // Ignore non-JSON responses
              }
      - $kind: http-request
        name: 'POST bulk productos JSON'
        method: POST
        url: '{{baseUrl}}/api/productos/bulk-upload/'
        headers:
          - key: Accept
            value: application/json
          - key: Content-Type
            value: application/json
        body:
          type: json
          content: |-
            [
              {
                "nom_produ": "Arroz",
                "stock_actual_produ": "50.000",
                "stock_minimo_produ": "10.000",
                "fecha_venci_produ": "2026-12-31",
                "precio_uni_produ": "1200.00",
                "des_produ": "Arroz blanco 1kg",
                "estado_produ": "disponible",
                "id_provee_produ_fk": 1,
                "id_uni_medi_produ_fk": 1,
                "id_cate_produ_fk": 1
              },
            ]
        scripts:
          - type: afterResponse
            language: text/javascript
            code: |-
              pm.test("Status is 2xx", function () {
                pm.expect(pm.response.code).to.be.within(200, 299);
              });

              try {
                pm.response.json();
              } catch (e) {
                // Ignore non-JSON responses
              }
      - $kind: http-request
        name: 'POST bulk productos CSV'
        method: POST
        url: '{{baseUrl}}/api/productos/bulk-upload/'
        headers:
          - key: Accept
            value: application/json
        body:
          type: formdata
          content:
            - key: file
              type: file
              src: ''
        scripts:
          - type: afterResponse
            language: text/javascript
            code: |-
              pm.test("Status is 2xx", function () {
                pm.expect(pm.response.code).to.be.within(200, 299);
              });

              try {
                pm.response.json();
              } catch (e) {
                // Ignore non-JSON responses
              }
